</div>
</div>
<div class="flex items-center justify-between gap-4">
<div class="font-mono-display text-mono-display text-on-surface break-all select-all" data-password-display>
                        x7#kL9@mP2$vQ8*wN5!cR4^tB1&amp;hY6
                    </div>
<button aria-label="Copy password" class="flex-shrink-0 w-12 h-12 flex items-center justify-center rounded-lg bg-surface-container hover:bg-surface-bright transition-colors border border-outline-variant text-primary group-hover:text-primary-container" data-copy type="button">

</div>

<span>8</span>

<!-- Toggles -->

<div class="flex flex-col md:flex-row justify-between items-center px-8 py-12 max-w-[640px] mx-auto gap-4">

                © 2024 CYPHER_GEN. SECURE_PROTOCOL_ACTIVE.

<div class="flex gap-4">
<a class="font-['Space_Grotesk'] text-[10px] tracking-widest uppercase text-neutral-600 hover:text-[#39FF14] transition-opacity cursor-pointer opacity-80 hover:opacity-100" href="#">Security Specs</a>

<a class="font-['Space_Grotesk'] text-[10px] tracking-widest uppercase text-neutral-600 hover:text-[#39FF14] transition-opacity cursor-pointer opacity-80 hover:opacity-100" href="#">Privacy</a>

<script>
    const passwordDisplay = document.querySelector('[data-password-display]');
    const lengthValue = document.querySelector('[data-length-value]');
    const lengthProgress = document.querySelector('[data-length-progress]');
    const lengthSlider = document.querySelector('input[type="range"]');
    const generateBtn = document.querySelector('button.glow-button');
    const copyBtn = document.querySelector('[data-copy]');
    const footerStatus = document.querySelector('[data-footer-status]');
    const toggles = document.querySelectorAll('label.group');
    const API_BASE_URL = 'http://127.0.0.1:5000';
    const LOWERCASE = 'abcdefghijklmnopqrstuvwxyz';
    const UPPERCASE = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    const NUMBERS = '0123456789';
    const SYMBOLS = '!@#$%^&*()_+-=[]{}|;:,.<>?';

    footerStatus.textContent = '\u00A9 2024 CYPHER_GEN. SECURE_PROTOCOL_ACTIVE.';

    function setSwitchState(toggle, isActive) {
        toggle.setAttribute('data-active', String(isActive));
        const switchDiv = toggle.querySelector('.relative.w-12');
        const knob = switchDiv.querySelector('div');

        switchDiv.classList.toggle('bg-primary/20', isActive);
        switchDiv.classList.toggle('border-primary', isActive);
        switchDiv.classList.toggle('bg-surface-container', !isActive);
        switchDiv.classList.toggle('border-outline-variant', !isActive);
        knob.classList.toggle('right-1', isActive);
        knob.classList.toggle('left-1', !isActive);
    }

    function updateLengthDisplay() {
        const min = Number(lengthSlider.min);
        const max = Number(lengthSlider.max);
        const value = Number(lengthSlider.value);
        const percent = ((value - min) / (max - min)) * 100;

        lengthValue.textContent = value;
        lengthProgress.style.width = `${percent}%`;
    }

    function getSecureIndex(max) {
        const values = new Uint32Array(1);
        const limit = Math.floor(0x100000000 / max) * max;

        do {
            crypto.getRandomValues(values);
        } while (values[0] >= limit);

        return values[0] % max;
    }

    function generateLocalPassword(length, includeUpper, includeNumbers, includeSymbols) {
        if (!crypto?.getRandomValues) {
            throw new Error('Secure random generation is not available in this browser.');
        }

        let characters = LOWERCASE;
        if (includeUpper) characters += UPPERCASE;
        if (includeNumbers) characters += NUMBERS;
        if (includeSymbols) characters += SYMBOLS;

        return Array.from({ length }, () => characters[getSecureIndex(characters.length)]).join('');
    }

    // Initialize toggles with data attributes
    toggles.forEach((toggle) => {
        setSwitchState(toggle, true);
        toggle.addEventListener('click', () => {
            const isActive = toggle.getAttribute('data-active') === 'true';
            setSwitchState(toggle, !isActive);
            generatePassword();
        });
    });

    // Update length display
    lengthSlider.addEventListener('input', updateLengthDisplay);
    lengthSlider.addEventListener('change', generatePassword);

    // Generate password
    async function generatePassword() {
        const length = lengthSlider.value;
        const upper = toggles[0].getAttribute('data-active') === 'true';
        const numbers = toggles[1].getAttribute('data-active') === 'true';
        const symbols = toggles[2].getAttribute('data-active') === 'true';

        try {
            const response = await fetch(`${API_BASE_URL}/generate?length=${length}&upper=${upper}&numbers=${numbers}&symbols=${symbols}`);
            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error || 'Unable to generate password');
            }

            passwordDisplay.textContent = data.password;
        } catch (error) {
            console.warn('Backend unavailable; generated password in the browser.', error);
            try {
                passwordDisplay.textContent = generateLocalPassword(Number(length), upper, numbers, symbols);
            } catch (fallbackError) {
                alert(fallbackError.message);
            }
        }
    }

    generateBtn.addEventListener('click', generatePassword);

    // Copy to clipboard
    copyBtn.addEventListener('click', async () => {
        try {
            await navigator.clipboard.writeText(passwordDisplay.textContent);
            // Visual feedback
            copyBtn.innerHTML = '<span class="material-symbols-outlined">check</span>';
            setTimeout(() => {
                copyBtn.innerHTML = '<span class="material-symbols-outlined">content_copy</span>';
            }, 1000);
        } catch (error) {
            alert('Failed to copy to clipboard');
        }
    });

    // Generate initial password
    updateLengthDisplay();
    generatePassword();
</script>
